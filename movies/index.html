<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies</title>
    <script type="module" src="../dist/movies.js" defer></script>
    <link href="/dist/output.css" rel="stylesheet" />
  </head>
  <body>
    <header class="relative z-100">
      <div
        id="mobile-header"
        class="w-full px-8 py-4 lg:hidden bg-[#400261] text-white font-bold flex"
      >
        <p class="font-bold">Cinethèque</p>
        <button id="menu-toggle" class="text-end ml-auto">MENU ☰</button>
      </div>
      <nav
        id="nav-menu"
        class="hidden lg:px-[10%] lg:flex flex-col lg:flex-row items-center gap-6 p-4 bg-gradient-to-r from-[#400261] to-[#41054A] text-white text-xl font-bold transition-all duration-300"
      >
        <a href="/" class="hover:text-amber-500 hover:scale-105 transition-all"
          >Accueil</a
        >
        <a
          href="/movies"
          class="hover:text-amber-500 hover:scale-105 transition-all underline decoration-amber-500 text-amber-200"
          >Films</a
        >
        <a
          href="/series"
          class="hover:text-amber-500 hover:scale-105 transition-all"
          >Séries</a
        >
        <a
          href="/favoris"
          class="hover:text-amber-500 hover:scale-105 transition-all"
          >Favoris</a
        >
        <div
          class="hidden mx-auto font-extrabold text-2xl text-amber-600 lg:block"
        >
          <p>Cinethèque</p>
        </div>

        <div class="relative lg:ml-auto w-full lg:w-auto">
          <input
            id="search-bar"
            class="w-full lg:w-64 bg-white/10 border border-white/20 rounded-full px-4 py-2 text-sm font-light text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white focus:text-black transition-all"
            placeholder="Rechercher..."
          />
          <div
            id="search-suggestions"
            class="absolute top-full left-0 right-0 mt-2 bg-white rounded-lg shadow-2xl text-black text-sm overflow-hidden hidden"
          ></div>
        </div>
      </nav>
    </header>
    <main class="lg:m-auto lg:max-w-400">
      <h2 class="text-3xl mb-20">Liste de films populaires</h2>
      <section
        id="popular-movie-section"
        class="flex justify-around flex-wrap gap-4"
      ></section>
      <section id="pagination" class=""></section>
    </main>
  </body>
</html>
